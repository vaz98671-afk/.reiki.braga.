<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        if (sessionStorage.getItem("isAuthenticated") !== "true") {
            window.location.href = "index.html";
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atualizar Contato</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Atualizar Contato</h1>
    <a href="index.html">Voltar ao Início</a>

    <form id="searchForm">
        <label for="searchQuery">Nome ou Número de Contribuinte (para buscar):</label>
        <input type="text" id="searchQuery" required>
        <button type="submit">Buscar Cliente</button>
    </form>

    <div id="output"></div>

    <form id="editForm" style="display:none;">
        <h2>Editar Ficha</h2>
        <label for="updateName">Nome:</label>
        <input type="text" id="updateName">
        <label for="updateTaxNumber">Número de Contribuinte:</label>
        <input type="text" id="updateTaxNumber" placeholder="Ex.: 123456789">
        <label for="updatePhone">Telefone:</label>
        <input type="text" id="updatePhone">
        <label for="updateEmail">Email:</label>
        <input type="text" id="updateEmail">
        <label for="updateNotes">Anotações:</label>
        <textarea id="updateNotes" rows="5" placeholder="Escreva anotações sobre o cliente"></textarea>
        <button type="submit">Atualizar</button>
    </form>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC_vfqR52SPO3xNm1jq5rMxnqY31erFHWg",
            authDomain: "reiki-gerenciamento.firebaseapp.com",
            projectId: "reiki-gerenciamento",
            storageBucket: "reiki-gerenciamento.firebasestorage.app",
            messagingSenderId: "913549564652",
            appId: "1:913549564652:web:7594db85cbcd820c0a23c9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let contactToUpdate = null;

        document.getElementById('searchForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const query = document.getElementById('searchQuery').value.trim().toLowerCase();
            
            try {
                const querySnapshot = await getDocs(collection(db, "contacts"));
                const foundContact = Array.from(querySnapshot.docs)
                    .map(doc => ({ id: doc.id, ...doc.data() }))
                    .find(c => 
                        (c.name && c.name.toLowerCase() === query) || 
                        (c.taxNumber && c.taxNumber.toLowerCase() === query)
                    );

                const outputDiv = document.getElementById('output');
                const editForm = document.getElementById('editForm');

                if (foundContact) {
                    contactToUpdate = foundContact;
                    document.getElementById('updateName').value = foundContact.name || '';
                    document.getElementById('updateTaxNumber').value = foundContact.taxNumber || '';
                    document.getElementById('updatePhone').value = foundContact.phone || '';
                    document.getElementById('updateEmail').value = foundContact.email || '';
                    document.getElementById('updateNotes').value = foundContact.notes || '';
                    
                    outputDiv.innerText = `A editar o cliente: ${foundContact.name}`;
                    editForm.style.display = 'block';
                } else {
                    contactToUpdate = null;
                    outputDiv.innerText = 'Cliente não encontrado.';
                    editForm.style.display = 'none';
                }
            } catch (error) {
                console.error("Erro:", error);
                document.getElementById('output').innerText = 'Erro ao procurar cliente!';
            }
        });

        document.getElementById('editForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            if (!contactToUpdate) return;

            const newName = document.getElementById('updateName').value.trim();
            const newTaxNumber = document.getElementById('updateTaxNumber').value.trim();
            const newPhone = document.getElementById('updatePhone').value.trim();
            const newEmail = document.getElementById('updateEmail').value.trim();
            const newNotes = document.getElementById('updateNotes').value.trim();

            try {
                await updateDoc(doc(db, "contacts", contactToUpdate.id), {
                    name: newName || contactToUpdate.name,
                    taxNumber: newTaxNumber || contactToUpdate.taxNumber,
                    phone: newPhone || contactToUpdate.phone,
                    email: newEmail || contactToUpdate.email,
                    notes: newNotes || contactToUpdate.notes
                });
                document.getElementById('output').innerText = 'Contato atualizado com sucesso!';
                document.getElementById('editForm').style.display = 'none';
                document.getElementById('searchForm').reset();
                contactToUpdate = null;
            } catch (error) {
                console.error("Erro:", error);
                document.getElementById('output').innerText = 'Erro ao atualizar contato!';
            }
        });
    </script>
</body>
</html>
