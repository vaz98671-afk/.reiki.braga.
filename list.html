<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        if (sessionStorage.getItem("isAuthenticated") !== "true") {
            window.location.href = "index.html";
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listar Contatos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Listar Contatos</h1>
    <a href="index.html">Voltar ao Início</a>
    <button id="listBtn">Listar</button>
    <div id="contactList"></div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC_vfqR52SPO3xNm1jq5rMxnqY31erFHWg",
            authDomain: "reiki-gerenciamento.firebaseapp.com",
            projectId: "reiki-gerenciamento",
            storageBucket: "reiki-gerenciamento.firebasestorage.app",
            messagingSenderId: "913549564652",
            appId: "1:913549564652:web:7594db85cbcd820c0a23c9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('listBtn').addEventListener('click', async function() {
            try {
                const querySnapshot = await getDocs(collection(db, "contacts"));
                const listDiv = document.getElementById('contactList');
                listDiv.innerHTML = '';
                
                if (querySnapshot.empty) {
                    listDiv.innerHTML = '<p>Nenhum contato encontrado.</p>';
                } else {
                    querySnapshot.forEach(doc => {
                        const contact = doc.data();
                        const div = document.createElement('div');
                        div.className = 'contact-item';
                        const notesFormatted = (contact.notes || 'Nenhuma anotação.').replace(/\n/g, '<br>');
                        div.innerHTML = `
                            Nome: ${contact.name}<br>
                            Número de Contribuinte: ${contact.taxNumber || 'Não informado'}<br>
                            Telefone: ${contact.phone}<br>
                            Email: ${contact.email}<br>
                            <p style="white-space: pre-wrap; word-wrap: break-word;">Anotações: ${notesFormatted}</p>
                        `;
                        listDiv.appendChild(div);
                    });
                }
            } catch (error) {
                console.error("Erro:", error);
                document.getElementById('contactList').innerHTML = '<p>Erro ao carregar contatos!</p>';
            }
        });
    </script>
</body>
</html>
