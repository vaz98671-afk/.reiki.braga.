<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        if (sessionStorage.getItem("isAuthenticated") !== "true") {
            window.location.href = "index.html";
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eliminar Contato</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Eliminar Contato</h1>
    <a href="index.html">Voltar ao Início</a>
    <form id="deleteForm">
        <label for="deleteQuery">Nome ou Número de Contribuinte:</label>
        <input type="text" id="deleteQuery" required>
        <button type="submit">Buscar</button>
    </form>
    <div id="output"></div>
    <div id="contactDetails" style="display:none;">
        <h2>Ficha do Cliente</h2>
        <p><strong>Nome:</strong> <span id="detailName"></span></p>
        <p><strong>Nº Contribuinte:</strong> <span id="detailTaxNumber"></span></p>
        <p><strong>Telefone:</strong> <span id="detailPhone"></span></p>
        <p><strong>Email:</strong> <span id="detailEmail"></span></p>
        <p><strong>Anotações:</strong> <span id="detailNotes"></span></p>
        <button id="confirmDeleteButton">Confirmar Eliminação</button>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC_vfqR52SPO3xNm1jq5rMxnqY31erFHWg",
            authDomain: "reiki-gerenciamento.firebaseapp.com",
            projectId: "reiki-gerenciamento",
            storageBucket: "reiki-gerenciamento.firebasestorage.app",
            messagingSenderId: "913549564652",
            appId: "1:913549564652:web:7594db85cbcd820c0a23c9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let contactToDelete = null;

        document.getElementById('deleteForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const query = document.getElementById('deleteQuery').value.trim().toLowerCase();
            
            try {
                const querySnapshot = await getDocs(collection(db, "contacts"));
                const contact = Array.from(querySnapshot.docs)
                    .map(doc => ({ id: doc.id, ...doc.data() }))
                    .find(c => 
                        (c.name && c.name.toLowerCase() === query) || 
                        (c.taxNumber && c.taxNumber.toLowerCase() === query)
                    );

                const outputDiv = document.getElementById('output');
                const detailsDiv = document.getElementById('contactDetails');
                
                if (contact) {
                    contactToDelete = contact;
                    outputDiv.innerText = 'Contato encontrado. Confirme a eliminação.';
                    detailsDiv.style.display = 'block';
                    document.getElementById('detailName').innerText = contact.name;
                    document.getElementById('detailTaxNumber').innerText = contact.taxNumber || 'N/A';
                    document.getElementById('detailPhone').innerText = contact.phone;
                    document.getElementById('detailEmail').innerText = contact.email;
                    const notesFormatted = (contact.notes || 'Nenhuma').replace(/\n/g, '<br>');
                    document.getElementById('detailNotes').innerHTML = notesFormatted;
                } else {
                    contactToDelete = null;
                    outputDiv.innerText = 'Contato não encontrado.';
                    detailsDiv.style.display = 'none';
                }
            } catch (error) {
                console.error("Erro:", error);
                document.getElementById('output').innerText = 'Erro ao procurar contato!';
            }
        });

        document.getElementById('confirmDeleteButton').addEventListener('click', async function() {
            if (contactToDelete) {
                try {
                    await deleteDoc(doc(db, "contacts", contactToDelete.id));
                    document.getElementById('output').innerText = 'Contato eliminado com sucesso!';
                    document.getElementById('contactDetails').style.display = 'none';
                    document.getElementById('deleteForm').reset();
                    contactToDelete = null;
                } catch (error) {
                    console.error("Erro:", error);
                    document.getElementById('output').innerText = 'Erro ao eliminar contato!';
                }
            }
        });
    </script>
</body>
</html>
