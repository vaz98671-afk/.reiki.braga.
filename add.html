<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        if (sessionStorage.getItem("isAuthenticated") !== "true") {
            window.location.href = "index.html";
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar Contato</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Adicionar Contato</h1>
    <a href="index.html">Voltar ao Início</a>
    <form id="addForm">
        <label for="addName">Nome:</label>
        <input type="text" id="addName">
        <label for="addTaxNumber">Número de Contribuinte:</label>
        <input type="text" id="addTaxNumber" placeholder="Ex.: 123456789">
        <label for="addPhone">Telefone:</label>
        <input type="text" id="addPhone">
        <label for="addEmail">Email:</label>
        <input type="text" id="addEmail">
        <label for="addNotes">Anotações:</label>
        <textarea id="addNotes" rows="5" placeholder="Escreva anotações sobre o cliente"></textarea>
        <button type="submit">Adicionar</button>
    </form>
    <div id="output"></div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC_vfqR52SPO3xNm1jq5rMxnqY31erFHWg",
            authDomain: "reiki-gerenciamento.firebaseapp.com",
            projectId: "reiki-gerenciamento",
            storageBucket: "reiki-gerenciamento.firebasestorage.app",
            messagingSenderId: "913549564652",
            appId: "1:913549564652:web:7594db85cbcd820c0a23c9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('addForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const name = document.getElementById('addName').value.trim();
            const taxNumber = document.getElementById('addTaxNumber').value.trim();
            const phone = document.getElementById('addPhone').value.trim();
            const email = document.getElementById('addEmail').value.trim();
            const notes = document.getElementById('addNotes').value.trim();
            
            if (name || taxNumber || phone || email || notes) {
                try {
                    await addDoc(collection(db, "contacts"), {
                        name: name || "N/A",
                        taxNumber: taxNumber || "N/A",
                        phone: phone || "N/A",
                        email: email || "N/A",
                        notes: notes || "N/A",
                        createdAt: new Date()
                    });
                    document.getElementById('output').innerText = 'Contato adicionado com sucesso!';
                    this.reset();
                } catch (error) {
                    console.error("Erro:", error);
                    document.getElementById('output').innerText = 'Erro ao adicionar contato!';
                }
            } else {
                document.getElementById('output').innerText = 'Preencha pelo menos um campo para adicionar o contato.';
            }
        });
    </script>
</body>
</html>
