<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        if (sessionStorage.getItem("isAuthenticated") !== "true") {
            window.location.href = "index.html";
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procurar Contato</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Procurar Contato</h1>
    <a href="index.html">Voltar ao Início</a>
    <form id="searchForm">
        <label for="searchQuery">Nome ou Número de Contribuinte:</label>
        <input type="text" id="searchQuery" required>
        <button type="submit">Procurar</button>
    </form>
    <div id="output"></div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC_vfqR52SPO3xNm1jq5rMxnqY31erFHWg",
            authDomain: "reiki-gerenciamento.firebaseapp.com",
            projectId: "reiki-gerenciamento",
            storageBucket: "reiki-gerenciamento.firebasestorage.app",
            messagingSenderId: "913549564652",
            appId: "1:913549564652:web:7594db85cbcd820c0a23c9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('searchForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const query = document.getElementById('searchQuery').value.trim().toLowerCase();
            
            try {
                const querySnapshot = await getDocs(collection(db, "contacts"));
                const found = Array.from(querySnapshot.docs)
                    .map(doc => ({ id: doc.id, ...doc.data() }))
                    .find(c => 
                        (c.name && c.name.toLowerCase() === query) || 
                        (c.taxNumber && c.taxNumber.toLowerCase() === query)
                    );
                
                const outputDiv = document.getElementById('output');
                if (found) {
                    const notesFormatted = (found.notes || 'Nenhuma anotação.').replace(/\n/g, '<br>');
                    outputDiv.innerHTML = `
                        Contato encontrado:<br>
                        Nome: ${found.name}<br>
                        Número de Contribuinte: ${found.taxNumber || 'Não informado'}<br>
                        Telefone: ${found.phone}<br>
                        Email: ${found.email}<br>
                        <p style="white-space: pre-wrap; word-wrap: break-word;">Anotações: ${notesFormatted}</p>
                    `;
                } else {
                    outputDiv.innerText = 'Contato não encontrado.';
                }
                this.reset();
            } catch (error) {
                console.error("Erro:", error);
                document.getElementById('output').innerText = 'Erro ao procurar contato!';
            }
        });
    </script>
</body>
</html>
