<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reiki</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="loginForm">
        <h1>Acesso Restrito</h1>
        <form id="authForm">
            <label for="password">Senha:</label>
            <input type="password" id="password" required>
            <button type="submit">Entrar</button>
        </form>
        <p id="loginMessage" style="color: red;"></p>
    </div>
    <div id="mainContent" style="display:none;">
    <h1>Reiki</h1>
    <h2>Gerenciamento de Clientes</h2>
    <nav>
        <ul>
            <li><a href="add.html">Adicionar Contato</a></li>
            <li><a href="list.html">Listar Contatos</a></li>
            <li><a href="search.html">Procurar Contato</a></li>
            <li><a href="update.html">Atualizar Contato</a></li>
            <li><a href="delete.html">Eliminar Contato</a></li>
        </ul>
    </nav>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC_vfqR52SPO3xNm1jq5rMxnqY31erFHWg",
            authDomain: "reiki-gerenciamento.firebaseapp.com",
            projectId: "reiki-gerenciamento",
            storageBucket: "reiki-gerenciamento.firebasestorage.app",
            messagingSenderId: "913549564652",
            appId: "1:913549564652:web:7594db85cbcd820c0a23c9"
        };

        const app = initializeApp(firebaseConfig);

        const CORRECT_PASSWORD = "reiki2025";
        const SESSION_KEY = "isAuthenticated";

        function checkAuth() {
            if (sessionStorage.getItem(SESSION_KEY) === "true") {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            } else {
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('mainContent').style.display = 'none';
            }
        }

        document.getElementById('authForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const loginMessage = document.getElementById('loginMessage');

            if (password === CORRECT_PASSWORD) {
                sessionStorage.setItem(SESSION_KEY, "true");
                checkAuth();
            } else {
                loginMessage.innerText = "Senha incorreta. Tente novamente.";
            }
        });

        checkAuth();
    </script>
</body>
</html>
